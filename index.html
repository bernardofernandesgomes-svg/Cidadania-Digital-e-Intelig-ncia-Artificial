<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cidadania Digital Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h1>🌐 Bem-vindo</h1>
    <input id="name" placeholder="Digite seu nome">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<header>
  <h2>🚀 Cidadania Digital Pro</h2>

  <!-- 🔥 ADIÇÃO: usuário logado -->
  <div id="userBox" style="color:#38bdf8; font-size:14px;"></div>
</header>

<nav>
  <button onclick="show('home')">Home</button>
  <button onclick="show('quiz')">Quiz</button>
  <button onclick="show('rank')">Ranking</button>
</nav>

<section id="home" class="page active">

  <div class="hero">
    <h1>Aprenda tecnologia de forma simples</h1>
  </div>

  <!-- 🔥 ADIÇÃO: mensagem extra -->
  <p id="welcomeMsg" style="text-align:center; margin-top:10px; color:#38bdf8;"></p>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
      <h3>Cidadania Digital</h3>
      <p>Uso responsável da internet e redes sociais.</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995">
      <h3>Inteligência Artificial</h3>
      <p>Máquinas que aprendem com dados.</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b">
      <h3>Segurança</h3>
      <p>Proteja seus dados online.</p>
    </div>

  </div>

</section>

<section id="quiz" class="page">

  <div class="box2">

    <h2 id="q">Pergunta</h2>

    <!-- 🔥 ADIÇÃO: progresso -->
    <p id="progress" style="color:#38bdf8;"></p>

    <div id="a"></div>
    <p id="f"></p>

    <button onclick="next()">Próxima</button>
  </div>

</section>

<section id="rank" class="page">

  <h2>🏆 Ranking</h2>
  <div id="ranking"></div>

</section>

<footer>
feito por Bernardo Fernandes
</footer>

<script src="script.js"></script>
</body>
</html>
